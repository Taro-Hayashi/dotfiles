services:
  pihole:
    image: pihole/pihole:latest
    restart: unless-stopped
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8080:80"
    volumes:
      - pihole_data:/etc/pihole
      - dnsmasq_data:/etc/dnsmasq.d
    environment:
      TZ: Asia/Tokyo
      WEBPASSWORD: ""  # 要変更

volumes:
  pihole_data:
  dnsmasq_data:
