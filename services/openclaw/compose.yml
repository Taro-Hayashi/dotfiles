services:
  openclaw-gateway:
    image: openclawai/openclaw:latest
    restart: unless-stopped
    ports:
      - "18789:18789"
    volumes:
      - config:/home/node/.openclaw
      - workspace:/home/node/.openclaw/workspace
    environment:
      - NODE_ENV=production
      - TZ=Asia/Tokyo
      - OLLAMA_BASE_URL=http://Windows.local:11434/v1
      - OLLAMA_API_KEY=ollama-local

volumes:
  config:
  workspace:
